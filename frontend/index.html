<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoBot — Repository Analyzer</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  /* Input area */
  .input-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .input-row input {
    flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px; outline: none;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
    transition: opacity .15s;
  }
  .input-row button:hover { opacity: .85; }
  .input-row button:disabled { opacity: .4; cursor: not-allowed; }

  /* Job card */
  .job-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .job-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .job-header h2 { font-size: 16px; font-weight: 600; }
  .job-header .badge {
    padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase;
  }
  .badge-scanning { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-analyzing { background: rgba(88,166,255,.15); color: var(--accent); }
  .badge-writing { background: rgba(188,140,255,.15); color: var(--purple); }
  .badge-assembling { background: rgba(188,140,255,.15); color: var(--purple); }
  .badge-done { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-error { background: rgba(248,81,73,.15); color: var(--red); }

  .stats-row { display: flex; gap: 20px; margin-bottom: 16px; font-size: 13px; color: var(--muted); }
  .stats-row span { display: flex; align-items: center; gap: 4px; }

  /* Agent grid */
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .agent-card {
    padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); font-size: 13px;
  }
  .agent-card .agent-name { font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .agent-card .agent-progress { color: var(--muted); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-pending { background: var(--muted); }
  .dot-running { background: var(--yellow); animation: pulse 1s infinite; }
  .dot-done { background: var(--green); }
  .dot-error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .actions { display: flex; gap: 10px; }
  .actions button {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer;
    transition: border-color .15s;
  }
  .actions button:hover { border-color: var(--accent); }
  .actions button.primary { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
  .actions button:disabled { opacity: .3; cursor: not-allowed; }

  .elapsed { font-size: 13px; color: var(--muted); }

  /* Report preview */
  .report-preview {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-top: 12px; max-height: 500px; overflow-y: auto;
    font-size: 13px; line-height: 1.6; white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', monospace;
    display: none;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { font-size: 15px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1><span>RepoBot</span> Analyzer</h1>
  <p class="subtitle">Multi-agent repository analysis powered by free OpenRouter models</p>

  <div class="input-row" style="margin-bottom:10px">
    <input type="text" id="apiUrl" placeholder="Backend URL, e.g. http://your-server:8877" style="flex:0.6" />
    <button onclick="saveApi()" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">Set Backend</button>
  </div>
  <div class="input-row">
    <input type="text" id="repoPath" placeholder="GitHub URL or local path, e.g. https://github.com/user/repo" />
    <button id="analyzeBtn" onclick="startAnalysis()">Analyze</button>
  </div>

  <div id="jobsList"></div>

  <div id="emptyState" class="empty-state">
    <p>Enter a repository path and click <strong>Analyze</strong> to begin.</p>
  </div>
</div>

<script>
// Backend URL — empty means same-origin (local dev), set for remote hosting
const DEFAULT_API = 'https://repobot-513190142794.europe-north1.run.app';
let API = localStorage.getItem('repobot_api') || DEFAULT_API;
let jobs = {};

// Populate saved backend URL
document.addEventListener('DOMContentLoaded', () => {
  // Clear stale localhost values
  const saved = localStorage.getItem('repobot_api');
  if (saved && saved.includes('localhost')) {
    localStorage.removeItem('repobot_api');
    API = DEFAULT_API;
  }
  document.getElementById('apiUrl').value = API;
});
function saveApi() {
  const url = document.getElementById('apiUrl').value.trim().replace(/\/+$/, '');
  localStorage.setItem('repobot_api', url);
  API = url;
  alert(url ? 'Backend set to: ' + url : 'Backend set to same-origin (local)');
}

async function startAnalysis() {
  const input = document.getElementById('repoPath');
  const btn = document.getElementById('analyzeBtn');
  const path = input.value.trim();
  if (!path) return;

  btn.disabled = true;
  btn.textContent = 'Starting...';

  const url = `${API}/api/analyze?repo_path=${encodeURIComponent(path)}`;
  try {
    const res = await fetch(url, { method: 'POST', mode: 'cors' });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    connectWebSocket(data.job_id, path);
  } catch(e) { alert('Failed to start: ' + e.message + '\nAPI URL: ' + url); }
  finally { btn.disabled = false; btn.textContent = 'Analyze'; }
}

function connectWebSocket(jobId, repoPath) {
  const apiHost = API ? API.replace(/^https?:\/\//, '') : location.host;
  const wsProto = API && API.startsWith('https') ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${wsProto}//${apiHost}/ws/${jobId}`);

  jobs[jobId] = {
    id: jobId, repo_path: repoPath, status: 'scanning',
    agents: {}, elapsed: 0, stats: {}, report_ready: false, showPreview: false,
  };

  document.getElementById('emptyState').style.display = 'none';

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const job = jobs[jobId];

    if (msg.type === 'snapshot') {
      job.status = msg.status;
      job.agents = msg.agents || {};
      job.elapsed = msg.elapsed_seconds;
      job.stats = msg.repo_stats;
      job.report_ready = msg.report_ready;
    } else if (msg.type === 'status') {
      job.status = msg.status;
    } else if (msg.type === 'scanned') {
      job.stats = msg.stats;
    } else if (msg.type === 'agent_update') {
      if (!job.agents[msg.agent]) job.agents[msg.agent] = {};
      job.agents[msg.agent].status = msg.status;
      job.agents[msg.agent].progress = msg.progress;
    } else if (msg.type === 'error') {
      job.status = 'error';
      job.error = msg.error;
    }

    if (job.status === 'done') job.report_ready = true;
    render();
  };

  ws.onclose = () => { if (jobs[jobId]?.status !== 'done') jobs[jobId].status = 'disconnected'; render(); };

  // Elapsed timer
  const timer = setInterval(() => {
    if (jobs[jobId]?.status === 'done' || jobs[jobId]?.status === 'error') { clearInterval(timer); return; }
    jobs[jobId].elapsed = (jobs[jobId].elapsed || 0) + 1;
    render();
  }, 1000);

  render();
}

const AGENT_LABELS = {
  architecture: 'Architecture Overview',
  data_structures: 'Data Structures & Schemas',
  apis: 'APIs & Interfaces',
  dependencies: 'Dependencies & Build',
  testing: 'Testing & Quality',
  summary: 'Executive Summary',
};

function render() {
  const container = document.getElementById('jobsList');
  container.innerHTML = Object.values(jobs).map(job => {
    const agentsHtml = Object.entries(job.agents).map(([key, a]) => `
      <div class="agent-card">
        <div class="agent-name">
          <span class="status-dot dot-${a.status || 'pending'}"></span>
          ${AGENT_LABELS[key] || key}
        </div>
        <div class="agent-progress">${a.progress || 'Waiting...'}</div>
      </div>
    `).join('');

    const statsHtml = job.stats && Object.keys(job.stats).length ? `
      <div class="stats-row">
        <span>Files: ${job.stats.total_files || '?'}</span>
        <span>Code: ${job.stats.code_files || '?'}</span>
        <span>Config: ${job.stats.config_files || '?'}</span>
        <span>Sampled: ${job.stats.files_sampled || '?'}</span>
      </div>
    ` : '';

    const elapsed = formatTime(job.elapsed || 0);

    return `
      <div class="job-card">
        <div class="job-header">
          <h2>${job.repo_path}</h2>
          <div>
            <span class="elapsed">${elapsed}</span>
            <span class="badge badge-${job.status}">${job.status}</span>
          </div>
        </div>
        ${statsHtml}
        <div class="agents-grid">${agentsHtml}</div>
        <div class="actions">
          <button class="primary" ${job.report_ready ? '' : 'disabled'}
            onclick="downloadReport('${job.id}')">Download .md</button>
          <button ${job.report_ready ? '' : 'disabled'}
            onclick="togglePreview('${job.id}')">
            ${job.showPreview ? 'Hide Preview' : 'Preview Report'}
          </button>
        </div>
        <div class="report-preview" id="preview-${job.id}"
          style="display:${job.showPreview ? 'block' : 'none'}"></div>
      </div>
    `;
  }).join('');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function downloadReport(jobId) {
  window.open(`${API}/api/jobs/${jobId}/report`, '_blank');
}

async function togglePreview(jobId) {
  const job = jobs[jobId];
  job.showPreview = !job.showPreview;
  render();
  if (job.showPreview) {
    const el = document.getElementById(`preview-${jobId}`);
    if (el && !el.dataset.loaded) {
      const res = await fetch(`${API}/api/jobs/${jobId}/report/preview`);
      el.textContent = await res.text();
      el.dataset.loaded = '1';
    }
  }
}

// Load existing jobs on page load
(async () => {
  try {
    const res = await fetch(`${API}/api/jobs`);
    const data = await res.json();
    if (data.length) document.getElementById('emptyState').style.display = 'none';
    data.forEach(j => {
      jobs[j.job_id] = {
        id: j.job_id, repo_path: j.repo_path, status: j.status,
        agents: j.agents, elapsed: j.elapsed_seconds, stats: j.repo_stats,
        report_ready: j.report_ready, showPreview: false,
      };
    });
    render();
  } catch(e) {}
})();
</script>
</body>
</html>
