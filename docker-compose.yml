services:
  repobot:
    build: .
    ports:
      - "8877:8877"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HOST_MOUNT=/host
    volumes:
      # Mount host filesystem read-only so the scanner can access repos
      - /:/host:ro
      # SSL certs for HTTPS
      - ./backend/cert.pem:/app/backend/cert.pem:ro
      - ./backend/key.pem:/app/backend/key.pem:ro
    restart: unless-stopped
